<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeNumberFinder</title>
    <link rel="stylesheet" href="file.css">
</head>
<body>
    <div class="main">
        <div class="layout">
           
            <div class="heading">
                <h1>Prime Number Finder</h1>
                <h3>check your number here</h3>
            </div>
            <div class="input_box">
                <div class="num">
                    <input type="number" placeholder="enter the number you want to check">

                </div>
                <div class="check">
                    <button type="reset" id="clr_btn">Clear</button>
                    <button type="submit" id="sub_btn">Submit</button>
                </div>
            </div>
            <div class="result">

            </div>

        </div>

    </div>
    <script src="file.js"></script>
    
</body>
</html>
